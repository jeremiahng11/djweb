<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>Doodle Jump</title>
    <style>
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: #66a3d2; overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center;
      }
      canvas { display: block; }
      #highscore { position: absolute; left: -100px; top: -100px; width: 5px; display: none; }
    </style>
    <!-- PWA -->
    <meta name="theme-color" content="#66a3d2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Doodle Jump" />
    <link rel="manifest" href="app.webmanifest" />
    <link rel="apple-touch-icon" href="static/icons/apple-touch-icon.png" />
    <link rel="icon" href="static/icons/icon-192.png" />
    <script src="js/lib/phaser.min.js"></script>
    <!-- ONLINE build: assets load over HTTP from static/ (no inlined data-URIs, no perf overlay).
         For file:// play with no server, use classic-offline.html instead. -->
  </head>
  <body>
    <div id="err" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#fff;color:#c00;font:12px/1.4 monospace;white-space:pre-wrap;padding:10px;max-height:60%;overflow:auto;display:none"></div>
    <script>
      (function () {
        function show(msg) { var d = document.getElementById("err"); if (d) { d.style.display = "block"; d.textContent += msg + "\n"; } }
        window.addEventListener("error", function (e) {
          show("ERROR: " + (e.message || (e.error && e.error.message) || e.error) + "  @ " + (e.filename || "") + ":" + (e.lineno || "") + ":" + (e.colno || ""));
          if (e.error && e.error.stack) show(String(e.error.stack).split("\n").slice(0, 4).join("\n"));
        });
        window.addEventListener("unhandledrejection", function (e) { show("PROMISE: " + (e.reason && e.reason.message ? e.reason.message : e.reason)); });
        window.__DJ_DIAG = true;
      })();
      // PWA service worker (installable + offline after first load)
      if ("serviceWorker" in navigator)
        window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
      // iOS 13+ needs a gesture-driven permission before tilt (gyro) events fire
      (function () {
        function reqTilt() {
          try {
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === "function")
              DeviceOrientationEvent.requestPermission().catch(function () {});
          } catch (e) {}
        }
        window.addEventListener("touchend", reqTilt, { once: true });
        window.addEventListener("mousedown", reqTilt, { once: true });
      })();
    </script>
    <input id="highscore" type="text" />
    <script src="js/fulltilt.min.js"></script>
    <script src="js/classic-theme.js?v=133"></script>
    <script src="js/classic.themed.js?v=133"></script>
    <script src="js/doodle.js?v=133"></script>
  </body>
</html>
