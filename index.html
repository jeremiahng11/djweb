<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Doodle Jump</title>
    <style>
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: #1c1c1c; overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center;
      }
      canvas { display: block; }
      #highscore { position: absolute; left: -100px; top: -100px; width: 5px; display: none; }
    </style>
    <!-- PWA -->
    <meta name="theme-color" content="#1c1c1c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Doodle Jump" />
    <link rel="manifest" href="app.webmanifest" />
    <link rel="apple-touch-icon" href="static/icons/apple-touch-icon.png" />
    <link rel="icon" href="static/icons/icon-192.png" />
    <script src="js/lib/phaser.min.js"></script>
    <!-- ONLINE build: assets load over HTTP from static/ (no inlined data-URIs, no perf overlay).
         For file:// play with no server, use classic-offline.html instead. -->
  </head>
  <body>
    <div id="tapstart" style="position:fixed;inset:0;z-index:99998;background:#1c1c1c;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">
      <div style="font-size:38px;font-weight:800;letter-spacing:1px;">doodle jump</div>
      <div style="font-size:22px;margin-top:10px;opacity:.95;animation:djpulse 1.2s ease-in-out infinite;">tap to play</div>
      <div style="font-size:14px;margin-top:22px;opacity:.75;line-height:1.6;">tilt your phone &nbsp;·&nbsp; or touch &amp; drag<br/>to move left / right</div>
      <style>@keyframes djpulse{0%,100%{opacity:.55}50%{opacity:1}}</style>
    </div>
    <script>
      (function () {
        // console-only in the online build (no on-screen overlay); swallow the gyro library's noisy promise rejections
        window.addEventListener("error", function (e) { try { console.error("ERROR:", e.message, (e.filename || "") + ":" + (e.lineno || "")); } catch (x) {} });
        window.addEventListener("unhandledrejection", function (e) { try { console.warn("PROMISE:", e.reason && e.reason.message ? e.reason.message : e.reason); } catch (x) {} if (e.preventDefault) e.preventDefault(); });
      })();
      // PWA service worker (installable + offline after first load)
      if ("serviceWorker" in navigator)
        window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
      // iOS 13+ needs a gesture-driven permission before tilt (gyro) events fire (guarded so it only asks once)
      (function () {
        var asked = false;
        window.__djReqTilt = function () {
          if (asked) return; asked = true;
          try {
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === "function")
              DeviceOrientationEvent.requestPermission().catch(function () {});
          } catch (e) {}
        };
        function arm() { asked = false; window.addEventListener("touchend", window.__djReqTilt, { once: true }); window.addEventListener("mousedown", window.__djReqTilt, { once: true }); }
        arm();
        // re-arm tilt when the page comes back (screen was off / app switched) so the next tap re-enables gyro on iOS
        document.addEventListener("visibilitychange", function () { if (!document.hidden) arm(); });
        window.addEventListener("focus", arm);
        window.addEventListener("pageshow", arm);
      })();
      // tap-to-start overlay: one clean gesture grants iOS motion permission + unlocks audio, then reveals the game
      (function () {
        var ov = document.getElementById("tapstart"); if (!ov) return;
        function go() {
          if (window.__djReqTilt) window.__djReqTilt();
          try { var g = window.Doodle && window.Doodle.game; if (g && g.sound && g.sound.context && g.sound.context.resume) g.sound.context.resume(); } catch (e) {}
          ov.style.display = "none";
        }
        ov.addEventListener("click", go);
        ov.addEventListener("touchend", function (e) { e.preventDefault(); go(); }, { passive: false });
      })();
    </script>
    <input id="highscore" type="text" />
    <script src="js/fulltilt.min.js"></script>
    <script src="js/classic-theme.js?v=138"></script>
    <script src="js/classic.themed.js?v=138"></script>
    <script src="js/doodle.js?v=138"></script>
  </body>
</html>
