server {
    listen       3000;
    listen  [::]:3000;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip (helps the text JS/CSS; the big offline-assets.js is mostly already-compressed base64)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript text/css application/json image/svg+xml application/wasm;

    # the game is a single page; everything is relative
    location / {
        try_files $uri $uri/ /index.html;
    }

    # static assets — the app cache-busts JS/HTML via ?v=NNN query strings, so long cache is safe
    location ~* \.(js|css|png|jpe?g|gif|svg|mp3|ogg|wav|woff2?|ttf|fnt|json)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # don't cache the HTML shell (so version bumps land immediately)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # PWA manifest + service worker (correct MIME; SW must not be cached hard)
    location = /app.webmanifest { default_type application/manifest+json; expires 1d; }
    location = /sw.js { default_type application/javascript; add_header Cache-Control "no-cache"; }
}
