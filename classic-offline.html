<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>Doodle Jump (Offline)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #66a3d2;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
      }
      #highscore {
        position: absolute;
        left: -100px;
        top: -100px;
        width: 5px;
        display: none;
      }
    </style>
    <!-- Perf cap + diagnostics: must load before Phaser -->
    <script src="js/perf.js"></script>
    <!-- Engine + game scripts load fine from file:// -->
    <script src="js/lib/phaser.min.js"></script>
    <!-- Inlined assets + loader redirect: makes XHR-loaded assets work offline -->
    <script src="js/offline-assets.js"></script>
    <script src="js/offline-shim.js"></script>
  </head>

  <body>
    <input id="highscore" type="text" />
    <script src="js/fulltilt.min.js"></script>
    <script src="js/production.min.js"></script>
    <script src="js/doodle.js"></script>
  </body>
</html>
